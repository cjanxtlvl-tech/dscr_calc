version: "3.9"

services:
  dscr-app:
    build: .
    container_name: veecasa-dscr-app
    ports:
      - "3000:3000"
    volumes:
      - ./:/app
      - /app/node_modules
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
    command: node backend/server.js

  redis:
    image: redis:7-alpine
    container_name: veecasa-dscr-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data

volumes:
  redis_data:
